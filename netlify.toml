# Netlify deployment config (alternative to Vercel).
# Netlify Functions live in netlify/functions/, so if you deploy here instead
# of Vercel, move api/chat.js to netlify/functions/chat.js and it will be
# served at /.netlify/functions/chat — the redirect below maps /api/chat to it
# so the frontend code needs no change.

[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200

[[redirects]]
  from = "/api/token"
  to = "/.netlify/functions/token"
  status = 200

[[redirects]]
  from = "/api/admin"
  to = "/.netlify/functions/admin"
  status = 200

[[redirects]]
  from = "/dashboard"
  to = "/dashboard.html"
  status = 200

# SPA fallback so client routing works, but never for /api
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  conditions = {Role = ["public"]}
